<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Squawk — Beta Tester Feedback</title>
  <meta name="description" content="Howard AI beta tester feedback portal.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="Squawk-favicon.png">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.34.0/dist/tabler-icons.min.css">
</head>
<body>

  <!-- Login view (shown when unauthenticated, no nav) -->
  <div data-view="login"></div>

  <!-- Authenticated shell -->
  <div class="bt-shell hidden" id="bt-authenticated">
    <button class="bt-sidebar-toggle" id="bt-sidebar-toggle" aria-label="Open navigation">
      <i class="ti ti-layout-sidebar-left-expand" style="font-size:24px" aria-hidden="true"></i>
    </button>

    <div class="bt-sidebar-overlay" id="bt-sidebar-overlay"></div>

    <aside class="bt-sidebar" id="bt-sidebar">
      <div class="bt-sidebar-logo">
        <img src="Squawk-logo.png" alt="Squawk by Howard AI" id="bt-sidebar-logo-img">
      </div>
      <nav class="bt-nav" id="bt-nav" aria-label="Main navigation">
        <button class="bt-nav-item" data-target="dashboard">
          <i class="ti ti-layout-dashboard" style="font-size:20px" aria-hidden="true"></i>
          Dashboard
        </button>
        <div class="bt-nav-divider"></div>
        <button class="bt-nav-item" data-target="new">
          <i class="ti ti-square-rounded-plus" style="font-size:20px" aria-hidden="true"></i>
          New
        </button>
        <button class="bt-nav-item" data-target="drafts">
          <i class="ti ti-file-pencil" style="font-size:20px" aria-hidden="true"></i>
          Drafts
        </button>
        <button class="bt-nav-item" data-target="submitted">
          <i class="ti ti-checklist" style="font-size:20px" aria-hidden="true"></i>
          Submitted
        </button>
        <div class="bt-nav-divider"></div>
        <button class="bt-nav-item" data-target="messages">
          <i class="ti ti-message-2" style="font-size:20px" aria-hidden="true"></i>
          Messages
        </button>
        <button class="bt-nav-item" data-target="news">
          <i class="ti ti-news" style="font-size:20px" aria-hidden="true"></i>
          News
        </button>
        <button class="bt-nav-item" data-target="settings">
          <i class="ti ti-settings" style="font-size:20px" aria-hidden="true"></i>
          Settings
        </button>
      </nav>

      <div class="bt-sidebar-footer" id="bt-sidebar-footer">
        <div class="bt-sidebar-user" id="bt-sidebar-user-btn" data-target="settings">
          <div class="bt-avatar" id="bt-sidebar-avatar"></div>
          <span class="bt-sidebar-username" id="bt-sidebar-username"></span>
        </div>
        <button class="btn-icon" id="btn-signout" aria-label="Sign out">
          <i class="ti ti-logout" style="font-size:20px" aria-hidden="true"></i>
        </button>
      </div>
    </aside>

    <main class="bt-main">
      <div data-view="dashboard"></div>
      <div data-view="new"></div>
      <div data-view="drafts"></div>
      <div data-view="submitted"></div>
      <div data-view="submission-detail"></div>
      <div data-view="messages"></div>
      <div data-view="news"></div>
      <div data-view="settings"></div>
    </main>
  </div>

  <div id="toast-container" aria-live="polite" aria-atomic="false"></div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/bt.js"></script>
</body>
</html>
