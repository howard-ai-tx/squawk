<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Squawk Admin — Howard AI</title>
  <meta name="description" content="Howard AI internal feedback triage system.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="Squawk-favicon.png">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.34.0/dist/tabler-icons.min.css">
</head>
<body>

  <!-- Login view -->
  <div data-view="login"></div>

  <!-- Admin shell (sidebar + main) -->
  <div class="admin-shell hidden" id="admin-shell">
    <aside class="admin-sidebar">
      <div class="admin-sidebar-logo">
        <img src="Squawk-logo-white-text.png" alt="Squawk by Howard AI">
      </div>
      <nav class="admin-nav" aria-label="Admin navigation">
        <button class="admin-nav-item" data-target="dashboard">
          <i class="ti ti-layout-dashboard" style="font-size:20px" aria-hidden="true"></i>
          Dashboard
        </button>
        <div class="admin-nav-divider"></div>
        <button class="admin-nav-item" data-target="records">
          <i class="ti ti-files" style="font-size:20px" aria-hidden="true"></i>
          Records
        </button>
        <button class="admin-nav-item" data-target="users">
          <i class="ti ti-users" style="font-size:20px" aria-hidden="true"></i>
          Users
        </button>
        <div class="admin-nav-divider"></div>
        <button class="admin-nav-item" data-target="messages">
          <i class="ti ti-message-2" style="font-size:20px" aria-hidden="true"></i>
          Messages
        </button>
        <button class="admin-nav-item" data-target="news">
          <i class="ti ti-news" style="font-size:20px" aria-hidden="true"></i>
          News
        </button>
        <button class="admin-nav-item" data-target="settings">
          <i class="ti ti-settings" style="font-size:20px" aria-hidden="true"></i>
          Settings
        </button>
      </nav>

      <div class="bt-sidebar-footer admin-sidebar-footer" id="admin-sidebar-footer">
        <div class="bt-sidebar-user" id="admin-sidebar-user-btn" data-target="settings">
          <div class="bt-avatar" id="admin-sidebar-avatar"></div>
          <span class="bt-sidebar-username" id="admin-sidebar-username"></span>
        </div>
        <button class="btn-icon" id="btn-admin-signout" aria-label="Sign out">
          <i class="ti ti-logout" style="font-size:20px" aria-hidden="true"></i>
        </button>
      </div>
    </aside>

    <main class="admin-main">
      <div data-view="dashboard"></div>
      <div data-view="records"></div>
      <div data-view="users"></div>
      <div data-view="messages"></div>
      <div data-view="news"></div>
      <div data-view="settings"></div>
      <div data-view="ticket"></div>
    </main>
  </div>

  <div id="toast-container" aria-live="polite" aria-atomic="false"></div>

  <script src="assets/js/data.js?v=2"></script>
  <script src="assets/js/admin.js?v=3"></script>
</body>
</html>
